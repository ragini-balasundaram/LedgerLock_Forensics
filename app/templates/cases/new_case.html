{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold dark:text-white">Initialize New Case</h1>
            <p class="text-sm text-gray-500 dark:text-gray-400">Open a new digital forensics investigation record.</p>
        </div>
        <a href="/" class="text-sm text-brand hover:text-indigo-500 transition-colors">&larr; Back to Dashboard</a>
    </div>

    <form method="POST" action="{{ url_for('cases.new_case') }}" class="bg-white dark:bg-darkCard p-8 rounded-xl border border-gray-200 dark:border-darkBorder shadow-sm transition-colors">
        
        <div class="space-y-6">
            <div>
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase">Case Number / ID</label>
                <input type="text" name="case_number" required placeholder="e.g. CASE-2026-001" class="w-full bg-gray-50 dark:bg-darkBg border border-gray-300 dark:border-darkBorder rounded-md p-3 dark:text-white outline-none focus:border-brand transition-colors">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase">Investigation Title</label>
                <input type="text" name="title" required placeholder="e.g. Operation Phantom / Server Breach" class="w-full bg-gray-50 dark:bg-darkBg border border-gray-300 dark:border-darkBorder rounded-md p-3 dark:text-white outline-none focus:border-brand transition-colors">
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase">Initial Description (Optional)</label>
                <textarea name="description" rows="4" placeholder="Brief summary of the incident..." class="w-full bg-gray-50 dark:bg-darkBg border border-gray-300 dark:border-darkBorder rounded-md p-3 dark:text-white outline-none focus:border-brand transition-colors"></textarea>
            </div>

            <div class="pt-4 border-t border-gray-200 dark:border-darkBorder">
                <button type="submit" class="w-full bg-brand hover:bg-indigo-600 text-white font-bold py-3 rounded-md shadow-lg transition-all flex justify-center items-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Open Investigation
                </button>
            </div>
        </div>
    </form>
</div>
{% endblock %}

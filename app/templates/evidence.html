{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto">
    <div class="mb-8">
        <h1 class="text-2xl font-bold dark:text-white">Log New Evidence</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400">Initialize a new secure evidence record and establish chain of custody.</p>
    </div>

    <form method="POST" action="/evidence/log" class="bg-white dark:bg-darkCard p-8 rounded-xl border border-gray-200 dark:border-darkBorder shadow-sm transition-colors">
        
        <div class="space-y-6">
            <h3 class="text-sm font-bold dark:text-gray-200 flex items-center gap-2">
                <svg class="w-5 h-5 text-brand" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                Evidence Details
            </h3>

            <div class="grid grid-cols-2 gap-6">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase">Select Primary Case</label>
                    <select name="case_id" class="w-full bg-gray-50 dark:bg-darkBg border border-gray-300 dark:border-darkBorder rounded-md p-3 dark:text-white outline-none focus:border-brand">
                        <option>CASE-2024-0012</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase">Evidence Type</label>
                    <select name="evidence_type" class="w-full bg-gray-50 dark:bg-darkBg border border-gray-300 dark:border-darkBorder rounded-md p-3 dark:text-white outline-none focus:border-brand">
                        <option>Mobile Backup</option>
                        <option>Disk Image (E01)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase">Evidence Tag</label>
                <input type="text" name="evidence_tag" placeholder="e.g. ITEM-001-MD-A" class="w-full bg-gray-50 dark:bg-darkBg border border-gray-300 dark:border-darkBorder rounded-md p-3 dark:text-white outline-none focus:border-brand">
            </div>

            <div class="border-2 border-dashed border-gray-300 dark:border-darkBorder rounded-xl p-10 text-center hover:border-brand transition-colors">
                <svg class="w-10 h-10 text-gray-400 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                <p class="text-sm font-medium dark:text-white">Drag and drop evidence files</p>
                <p class="text-xs text-gray-500">Supports forensic images (.E01, .raw), mobile backups, or encrypted documents</p>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 mb-2 uppercase">Auto-Calculated SHA-256 Hash</label>
                <input type="text" readonly value="e3b0c44298fc1c149afbf4c8996fb92427ae41e4649b934ca495991b7852b855" class="w-full bg-gray-100 dark:bg-darkBg border border-gray-300 dark:border-darkBorder rounded-md p-3 text-gray-500 font-mono text-sm outline-none">
            </div>

            <button type="submit" class="w-full bg-brand hover:bg-indigo-600 text-white font-bold py-4 rounded-md shadow-lg transition-all">
                Securely Log Evidence
            </button>
        </div>
    </form>
</div>
{% endblock %}
